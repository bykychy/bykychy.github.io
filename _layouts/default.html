<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} — {{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <script>
    MathJax = {
      tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
      svg: { fontCache: 'global' }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
</head>
<body class="page-default">
  <nav class="top-nav" id="top-nav">
    <div class="nav-container">
      <a href="{{ '/' | relative_url }}" class="nav-logo">Central Asia Signals</a>
      <div class="nav-links">
        <a href="{{ '/tutorials/treasure-hunting/' | relative_url }}">Treasure Hunting</a>
        <a href="{{ '/tutorials/sar-remote-sensing/' | relative_url }}">SAR & Remote Sensing</a>
        <a href="{{ '/field-atlas/' | relative_url }}">Field Atlas</a>
      </div>
    </div>
  </nav>

  <main class="container site-main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div>
        <p class="footer-mark">Central Asia Signals</p>
        <p>A museum-style learning space for SAR, electromagnetic sensing, GPR, X-ray fluorescence, and mathematical interpretation.</p>
      </div>
      <ul class="footer-links">
        <li><a href="{{ '/tutorials/sar-remote-sensing/' | relative_url }}">SAR Tutorials</a></li>
        <li><a href="{{ '/tutorials/treasure-hunting/' | relative_url }}">Field Methods</a></li>
        <li><a href="{{ '/field-atlas/' | relative_url }}">Atlas</a></li>
      </ul>
    </div>
  </footer>

  <script>
    // Navigation scroll effect
    const nav = document.getElementById('top-nav');
    let lastScroll = 0;
    window.addEventListener('scroll', () => {
      const currentScroll = window.pageYOffset;
      if (currentScroll > 50) {
        nav.classList.add('scrolled');
      } else {
        nav.classList.remove('scrolled');
      }
      lastScroll = currentScroll;
    });

    // Solution toggles
    document.querySelectorAll('.solution-toggle').forEach(btn => {
      btn.addEventListener('click', () => {
        const sol = btn.nextElementSibling;
        sol.style.display = sol.style.display === 'none' ? 'block' : 'none';
        btn.textContent = sol.style.display === 'none' ? 'Show solution' : 'Hide solution';
      });
    });
  </script>
</body>
</html>
